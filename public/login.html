<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - M-TICKET</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">🎟️ M-TICKET</div>
        <div class="nav-links">
            <a href="index.html">Trang chủ</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Đăng Nhập</h2>
            <p>Chào mừng trở lại! Vui lòng đăng nhập để đặt vé.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                
                <button type="submit" class="btn-submit">Đăng Nhập</button>
            </form>

            <div class="divider">HOẶC ĐĂNG NHẬP BẰNG</div>

            <button class="btn-facebook">
                🔵 Tiếp tục với Facebook
            </button>

            <p style="margin-top: 25px; font-size: 0.95rem; color: #666;">
                Chưa có tài khoản? 
                <a href="register.html" style="color: #e94560; font-weight: bold;">Đăng ký ngay</a>
            </p>
        </div>
    </div>

</body>
</html>
