<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký MUSIC TICKET</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"> MUSIC TICKET</div>
        <div class="nav-links">
            <a href="index.html">Trang chủ</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Tạo Tài Khoản Mới</h2>
            <p>Điền thông tin dưới đây để trở thành thành viên.</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullname">Họ và Tên</label>
                    <input type="text" id="fullname" placeholder="Nhập họ tên của bạn" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Tạo mật khẩu (từ 6 ký tự)" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Xác nhận Mật khẩu</label>
                    <input type="password" id="confirm_password" placeholder="Nhập lại mật khẩu" required minlength="6">
                </div>
                
                <button type="submit" class="btn-submit">Đăng Ký Tài Khoản</button>
            </form>

            <div class="divider">HOẶC ĐĂNG KÝ BẰNG</div>

            <button class="btn-facebook">
                 Tiếp tục với Facebook
            </button>

            <p style="margin-top: 25px; font-size: 0.95rem; color: #666;">
                Đã có tài khoản? 
                <a href="login.html" style="color: #e94560; font-weight: bold;">Đăng nhập tại đây</a>
            </p>
        </div>
    </div>

</body>
</html>
