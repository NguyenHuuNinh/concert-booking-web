<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MUSIC TICKET</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body data-page="login">
  <nav class="navbar">
    <a class="logo" href="login.html">MUSIC TICKET</a>
    <div class="nav-links is-open">
      <a href="login.html">Login</a>
      <a href="register.html" class="btn-login">Register</a>
    </div>
  </nav>

  <main class="auth-container">
    <section class="auth-box">
      <p class="eyebrow">Welcome back</p>
      <h1>Login</h1>
      <p>Use your account to browse events and manage bookings.</p>
      <div class="alert" data-auth-message hidden></div>

      <form data-login-form>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@gmail.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="123456" required>
        </div>
        <button type="submit" class="btn-submit">Login</button>
      </form>

      <p class="auth-note">Demo account: admin@gmail.com / 123456</p>
      <p class="switch-link">Do not have an account? <a href="register.html">Register now</a></p>
    </section>
  </main>
</body>
</html>
