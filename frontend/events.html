<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - MUSIC TICKET</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body data-page="events">
  <nav class="navbar">
    <a class="logo" href="index.html">MUSIC TICKET</a>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation">☰</button>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="events.html">Events</a>
      <a href="index.html#bookings">My Bookings</a>
      <span class="nav-user" data-user-name></span>
      <button class="btn-login" data-logout type="button">Logout</button>
    </div>
  </nav>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Browse events</p>
      <h1>Choose your next live show.</h1>
      <p>Filter concerts by name, artist, city, or venue, then reserve tickets in a few clicks.</p>
    </section>

    <section class="toolbar">
      <input type="search" data-search placeholder="Search concert, artist, venue, city">
      <select data-city-filter aria-label="Filter by city">
        <option value="">All cities</option>
      </select>
    </section>

    <section class="content-section">
      <div class="concert-grid" data-events-list></div>
    </section>
  </main>

  <div class="modal" data-modal hidden>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-close-modal aria-label="Close">×</button>
      <div data-modal-content></div>
    </div>
  </div>
</body>
</html>
