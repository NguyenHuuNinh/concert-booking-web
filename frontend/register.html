<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MUSIC TICKET</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <nav class="navbar">
        <div class="logo">MUSIC TICKET</div>
        
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="login.html" class="btn-login">Login</a>
        </div>
        
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Create a New Account</h2>
            <p>Fill in the information below to become a member.</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" placeholder="Re-enter your password" required minlength="6">
                </div>
                
                <button type="submit" class="btn-submit">Register Account</button>
            </form>

            <div class="divider">OR REGISTER WITH</div>

            <button class="btn-facebook">
                 Continue with Facebook
            </button>

            <p style="margin-top: 25px; font-size: 0.95rem; color: #666;">
                Already have an account? 
                <a href="login.html" style="color: #e94560; font-weight: bold;">Login here</a>
            </p>
        </div>
    </div>

</body>
</html>
