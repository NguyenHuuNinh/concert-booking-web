<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MUSIC TICKET</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body data-page="register">
  <nav class="navbar">
    <a class="logo" href="login.html">MUSIC TICKET</a>
    <div class="nav-links is-open">
      <a href="login.html">Login</a>
      <a href="register.html" class="btn-login">Register</a>
    </div>
  </nav>

  <main class="auth-container">
    <section class="auth-box">
      <p class="eyebrow">New account</p>
      <h1>Create account</h1>
      <p>Register once and start reserving concert tickets immediately.</p>
      <div class="alert" data-auth-message hidden></div>

      <form data-register-form>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required minlength="6">
        </div>
        <button type="submit" class="btn-submit">Register Account</button>
      </form>

      <p class="switch-link">Already have an account? <a href="login.html">Login here</a></p>
    </section>
  </main>
</body>
</html>
